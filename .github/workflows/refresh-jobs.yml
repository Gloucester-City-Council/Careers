name: Refresh Jobs Feed

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # allow manual trigger from GitHub Actions UI

permissions:
  contents: write             # required to commit and push the updated XML

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fetch live jobs feed
        run: |
          curl -L --compressed --retry 3 --retry-delay 5 \
            -H "Accept: application/xml, text/xml, */*" \
            -H "User-Agent: Mozilla/5.0" \
            --dump-header /tmp/jobs-feed-headers.txt \
            -o /tmp/jobs-feed-new.xml \
            "https://careers.gloucestershire.gov.uk/GloucesterCity/jobs.xml?feedId=354055"
          echo "=== Response headers ==="
          cat /tmp/jobs-feed-headers.txt
          echo "=== File size: $(wc -c < /tmp/jobs-feed-new.xml) bytes ==="
          echo "=== First 50 lines of response ==="
          head -50 /tmp/jobs-feed-new.xml
          echo "=== End ==="

      - name: Validate feed before overwriting
        run: |
          echo "--- Fetched content (first 20 lines) ---"
          head -20 /tmp/jobs-feed-new.xml
          echo "--- End preview ---"
          # Must be a valid jobs XML feed (has <jobs> root) — empty feeds are allowed
          if ! grep -q "<jobs" /tmp/jobs-feed-new.xml; then
            echo "ERROR: fetched file does not look like a jobs XML feed — aborting to preserve existing feed"
            exit 1
          fi
          JOB_COUNT=$(grep -c '<job>' /tmp/jobs-feed-new.xml || true)
          echo "Validation passed — ${JOB_COUNT} job(s) found"
          cp /tmp/jobs-feed-new.xml jobs/jobs-feed.xml

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs/jobs-feed.xml
          git diff --cached --quiet || git commit -m "chore: refresh jobs feed [skip ci]"
          git push

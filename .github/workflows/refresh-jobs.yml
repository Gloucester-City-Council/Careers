name: Refresh Jobs Feed

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # allow manual trigger from GitHub Actions UI

permissions:
  contents: write             # required to commit and push the updated XML

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fetch jobs page
        run: |
          curl -L --compressed --retry 3 --retry-delay 5 \
            -H "Accept: text/html,application/xhtml+xml,*/*" \
            -H "User-Agent: Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)" \
            -o /tmp/jobs-page.html \
            "https://careers.gloucestershire.gov.uk/go/All-City-Council-Jobs/8557855/"
          echo "=== File size: $(wc -c < /tmp/jobs-page.html) bytes ==="
          echo "=== First 5 lines ==="
          head -5 /tmp/jobs-page.html
          echo "=== End ==="

      - name: Install Python deps
        run: pip3 install --quiet beautifulsoup4 lxml

      - name: Scrape HTML and generate XML
        run: |
          python3 scripts/scrape_jobs.py /tmp/jobs-page.html /tmp/jobs-feed-new.xml
          echo "=== Generated XML ==="
          cat /tmp/jobs-feed-new.xml
          echo "=== End ==="

      - name: Validate and copy feed
        run: |
          if ! grep -q "<jobs" /tmp/jobs-feed-new.xml 2>/dev/null; then
            echo "ERROR: scraper did not produce a valid jobs XML file"
            exit 1
          fi
          JOB_COUNT=$(grep -c '<job>' /tmp/jobs-feed-new.xml || true)
          echo "Validation passed — ${JOB_COUNT} job(s) found"
          cp /tmp/jobs-feed-new.xml jobs/jobs-feed.xml

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs/jobs-feed.xml
          git diff --cached --quiet || git commit -m "chore: refresh jobs feed [skip ci]"
          git pull --rebase origin HEAD
          git push
